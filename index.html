<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yakında Buradayız</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, Helvetica, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      .message {
        text-align: center;
        font-size: clamp(1.25rem, 2.5vw, 2rem);
        font-weight: 600;
        line-height: 1.5;
        padding: 1.5rem;
      }
    </style>
  </head>
  <body>
    <main class="message">
      Sitemiz yapım aşamasında. Yakında burada hizmet vermeye başlayacağız.
    </main>
  </body>
</html>
